version: '3.8'

services:
  # ==================== MQTT BROKER ====================
  mosquitto:
    image: iegomez/mosquitto-go-auth:latest
    container_name: imox_mosquitto
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_WS_PORT:-9001}:9001"
    volumes:
      - ./mqtt/mosquitto.conf:/etc/mosquitto/mosquitto.conf
      - ./mqtt/acl_file:/etc/mosquitto/acl_file
      - ./mqtt/password_file:/etc/mosquitto/password_file
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    networks:
      - imox_network
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck -u backend_admin -P backend_secure_password || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==================== TIME SERIES DB (INFLUXDB) ====================
  influxdb:
    image: influxdb:2
    container_name: imox_influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USER:-imox_admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD:-imox_secure_password}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG:-imox_org}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET:-imox_bucket}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN:-my-super-secret-auth-token}
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    networks:
      - imox_network
    healthcheck:
      test: "curl -f http://localhost:8086/ping"
      interval: 30s
      timeout: 10s
      retries: 5

  # ==================== RELATIONAL DB (MARIADB) ====================
  mariadb:
    image: mariadb:latest
    container_name: imox_mariadb
    restart: unless-stopped
    environment:
      - MARIADB_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-admin123}
      - MARIADB_DATABASE=${MYSQL_DATABASE:-imox_auth}
      - MARIADB_USER=${MYSQL_USER:-imox_user}
      - MARIADB_PASSWORD=${MYSQL_PASSWORD:-imox_pass}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - imox_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==================== REDIS (CACHE/SESSION) ====================
  redis:
    image: redis:7-alpine
    container_name: imox_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password_change_in_production}
    volumes:
      - redis_data:/data
    networks:
      - imox_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password_change_in_production}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==================== NESTJS BACKEND ====================
  nestjs:
    build:
      context: ..
      dockerfile: docker/nestjs/Dockerfile
      target: development
    container_name: imox_nestjs
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
      mariadb:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${NESTJS_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      
      # Database Connections
      MYSQL_HOST: mariadb
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-imox_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-imox_pass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-imox_auth}
      
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password_change_in_production}
      
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      
      # InfluxDB (New)
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN:-my-super-secret-auth-token}
      INFLUXDB_ORG: ${INFLUXDB_ORG:-imox_org}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-imox_bucket}
      
      # Legacy Variables (to be removed after code migration)
      MONGO_URI: "mongodb://dummy:27017/db" # Placeholder to avoid immediate crash if checked
      
    volumes:
      - ../src:/app/src
      - ../package.json:/app/package.json
      - ../tsconfig.json:/app/tsconfig.json
      - /app/node_modules
    networks:
      - imox_network
    command: npm run start:dev

volumes:
  mariadb_data:
  influxdb_data:
  influxdb_config:
  mosquitto_data:
  mosquitto_logs:
  redis_data:

networks:
  imox_network:
    driver: bridge
