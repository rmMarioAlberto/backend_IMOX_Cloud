# Override for production - GlitchTip
# Use: docker compose -f docker-compose.yml -f docker-compose.prod.yml up

services:
  glitchtip_web:
    # ❌ NO exponer puerto en producción
    # Solo accesible vía SSH tunnel o Nginx con auth
    ports: [] # Quitar exposición pública
    environment:
      # Deshabilitar registro público
      ENABLE_OPEN_USER_REGISTRATION: "False"

      # Configuraciones de producción
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-https://glitchtip.tu-dominio.com}
      EMAIL_URL: ${GLITCHTIP_EMAIL_URL:-smtp://usuario:password@smtp.gmail.com:587}
      DEFAULT_FROM_EMAIL: ${GLITCHTIP_FROM_EMAIL:-glitchtip@tu-dominio.com}

  # Opcional: Nginx con autenticación básica
  nginx:
    image: nginx:alpine
    container_name: imox_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro # Certificados SSL
    networks:
      - imox_network
    depends_on:
      - glitchtip_web
