services:
  # ==================== RELATIONAL DB (MARIADB) ====================
  mariadb:
    image: mariadb:11.2-jammy
    container_name: imox_mariadb
    restart: unless-stopped
    environment:
      - MARIADB_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-admin123}
      - MARIADB_DATABASE=${MYSQL_DATABASE:-imox_auth}
      - MARIADB_USER=${MYSQL_USER:-imox_user}
      - MARIADB_PASSWORD=${MYSQL_PASSWORD:-imox_pass}
    # NO EXPONER PUERTOS - solo acceso interno
    ports: []
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - imox_network
    deploy:
      resources:
        limits:
          memory: 200M
          cpus: '0.5'
        reservations:
          memory: 100M
    command: >
      --innodb-buffer-pool-size=64M
      --innodb-log-file-size=32M
      --innodb-flush-log-at-trx-commit=2
      --max-connections=50
      --skip-log-bin
      --innodb-flush-method=O_DIRECT
      --innodb-io-capacity=200
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== REDIS (CACHE/SESSION) ====================
  redis:
    image: redis:7.2-alpine
    container_name: imox_redis
    restart: unless-stopped
    # NO EXPONER PUERTOS - solo acceso interno
    ports: []
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --auto-aof-rewrite-percentage 100
      --auto-aof-rewrite-min-size 64mb
      --maxmemory 80mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --requirepass ${REDIS_PASSWORD:-redis_password_change_in_production}
    volumes:
      - redis_data:/data
    networks:
      - imox_network
    deploy:
      resources:
        limits:
          memory: 100M
          cpus: '0.3'
        reservations:
          memory: 40M
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis_password_change_in_production}", "ping"]
      interval: 60s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ==================== TIME SERIES DB (INFLUXDB) ====================
  influxdb:
    image: influxdb:2.7.10
    container_name: imox_influxdb
    restart: unless-stopped
    # NO EXPONER PUERTOS - solo acceso interno
    ports: []
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USER:-imox_admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD:-imox_secure_password}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG:-imox_org}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET:-imox_bucket}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN:-my-super-secret-auth-token}
      - INFLUXD_STORAGE_WAL_FSYNC_DELAY=1s
      - INFLUXD_STORAGE_CACHE_MAX_MEMORY_SIZE=100000000
      - INFLUXD_QUERY_CONCURRENCY=2
      - INFLUXD_STORAGE_SERIES_ID_SET_CACHE_SIZE=50
      - INFLUXD_HTTP_READ_TIMEOUT=30s
      - INFLUXD_HTTP_WRITE_TIMEOUT=30s
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    networks:
      - imox_network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.7'
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8086/health || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== MQTT BROKER ====================
  mosquitto:
    image: iegomez/mosquitto-go-auth:2.0.0
    container_name: imox_mosquitto
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    # NO EXPONER PUERTOS - Cloudflare Tunnel lo maneja
    ports: []
    environment:
      - MYSQL_USER=${MYSQL_USER:-imox_user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-imox_pass}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-imox_auth}
    volumes:
      - ./mqtt/mosquitto.conf:/etc/mosquitto/mosquitto.conf
      - ./mqtt/acl_file:/etc/mosquitto/acl_file
      - ./mqtt/password_file:/etc/mosquitto/password_file
      - mosquitto_data:/mosquitto/data
    tmpfs:
      - /mosquitto/log:size=10M
    networks:
      - imox_network
    deploy:
      resources:
        limits:
          memory: 80M
          cpus: '0.3'
        reservations:
          memory: 20M
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 mosquitto_sub -t '$$SYS/broker/uptime' -C 1 || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ==================== NESTJS BACKEND ====================
  nestjs:
    build:
      context: ..
      dockerfile: docker/nestjs/Dockerfile
      target: production
    container_name: imox_nestjs
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
      mariadb:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Solo exponer en localhost para Cloudflare Tunnel
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      
      # Database Connections
      MYSQL_HOST: mariadb
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-imox_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-imox_pass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-imox_auth}
      
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password_change_in_production}
      
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      
      # InfluxDB
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN:-my-super-secret-auth-token}
      INFLUXDB_ORG: ${INFLUXDB_ORG:-imox_org}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-imox_bucket}
      
    tmpfs:
      - /app/logs:size=20M
    networks:
      - imox_network
    deploy:
      resources:
        limits:
          memory: 250M
          cpus: '0.7'
        reservations:
          memory: 100M
    # Security hardening
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3000/health || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mariadb_data:
    driver: local
  influxdb_data:
    driver: local
  influxdb_config:
    driver: local
  mosquitto_data:
    driver: local
  redis_data:
    driver: local

networks:
  imox_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
