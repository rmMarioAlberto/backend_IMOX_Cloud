# Configuración de Mosquitto MQTT Broker para IMOX Cloud

# ==================== LISTENERS ====================

# Puerto TCP estándar para MQTT
listener 1883
protocol mqtt

# Puerto WebSocket para clientes web
listener 9001
protocol websockets

# ==================== CONFIGURACIÓN GENERAL ====================

# Permitir conexiones anónimas (CAMBIAR EN PRODUCCIÓN)
# Para producción, configurar autenticación con usuario/contraseña
allow_anonymous true

# Archivo de contraseñas (descomentar en producción)
# password_file /mosquitto/config/passwd

# ==================== PERSISTENCIA ====================

# Habilitar persistencia de mensajes
persistence true
persistence_location /mosquitto/data/

# Archivo de base de datos
autosave_interval 1800
autosave_on_changes false

# ==================== LOGGING ====================

log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# Tipos de logs
log_type error
log_type warning
log_type notice
log_type information

# Timestamp en logs
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# ==================== SEGURIDAD ====================

# Máximo de conexiones simultáneas
max_connections -1

# Timeout de cliente inactivo (segundos)
persistent_client_expiration 2h

# ==================== QoS Y MENSAJES ====================

# Tamaño máximo de payload (10MB)
message_size_limit 10485760

# Cola máxima de mensajes por cliente
max_queued_messages 1000

# Número máximo de QoS 1 y 2 mensajes en vuelo
max_inflight_messages 20

# ==================== TOPICS SYSTEM ====================

# Deshabilitar publicación de estadísticas del broker
# Descomentar para desarrollo/debugging
# sys_interval 10
