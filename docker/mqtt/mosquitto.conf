# Configuración de Mosquitto MQTT Broker para IMOX Cloud

# ==================== LISTENERS ====================

# Puerto TCP estándar para MQTT
listener 1883
protocol mqtt

# Puerto WebSocket para clientes web
listener 9001
protocol websockets

# ==================== CONFIGURACIÓN GENERAL ====================

# Permitir conexiones anónimas (CAMBIAR EN PRODUCCIÓN)
# Para producción, configurar autenticación con usuario/contraseña
allow_anonymous false

# Archivo de contraseñas (descomentar en producción)
# password_file /mosquitto/config/passwd

# ==================== PERSISTENCIA ====================

# Habilitar persistencia de mensajes
persistence true
persistence_location /mosquitto/data/

# Archivo de base de datos
autosave_interval 1800
autosave_on_changes false

# ==================== LOGGING ====================

log_dest stdout

# Tipos de logs
log_type error
log_type warning
log_type notice
log_type information
# log_type debug

# Timestamp en logs
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# ==================== SEGURIDAD ====================

# Máximo de conexiones simultáneas
max_connections -1

# Timeout de cliente inactivo (segundos)
persistent_client_expiration 2h

# ==================== QoS Y MENSAJES ====================

# Tamaño máximo de payload (10MB)
message_size_limit 10485760

# Cola máxima de mensajes por cliente
max_queued_messages 1000

# Número máximo de QoS 1 y 2 mensajes en vuelo
max_inflight_messages 20

# ==================== TOPICS SYSTEM ====================

# Deshabilitar publicación de estadísticas del broker
# Descomentar para desarrollo/debugging
# sys_interval 10

# ==================== AUTENTICACIÓN GO-AUTH ====================

auth_plugin /mosquitto/go-auth.so

# Backends
auth_opt_backends files,mysql

# Files backend
auth_opt_files_password_path /etc/mosquitto/password_file
auth_opt_files_acl_path /etc/mosquitto/acl_file

# MySQL backend
# IMPORTANT: These values are set via Docker environment variables
# See docker-compose.yml mosquitto.environment section
auth_opt_mysql_host mariadb
auth_opt_mysql_port 3306
auth_opt_mysql_user imox_user
auth_opt_mysql_password imox_pass
auth_opt_mysql_dbname imox_auth
auth_opt_mysql_userquery SELECT device_secret FROM iot WHERE id = ?
# auth_opt_mysql_superquery SELECT count(*) FROM iot WHERE id = ? AND 0=1
auth_opt_mysql_aclquery SELECT CONCAT('imox/devices/', id, '/#') as topic FROM iot WHERE id = ? AND (? IS NOT NULL OR 1=1)
auth_opt_mysql_allow_native_passwords true

# Hasher
auth_opt_hasher bcrypt
auth_opt_hasher_cost 10

# Log level
# auth_opt_log_level debug
