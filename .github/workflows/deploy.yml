name: Deploy to Raspberry Pi

on:
  push:
    branches: ['main']

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --omit=dev

      - name: Generate Prisma Client
        run: npx prisma generate --schema=./src/database/prisma/schemaMaria.prisma

      - name: Build Application
        run: npm run build

      - name: Restart PM2
        run: |
          pm2 reload imox-backend || pm2 start dist/main.js --name imox-backend
          pm2 save
